version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: interview_mongo
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: interview_platform

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interview_backend
    restart: always
    ports:
      - '5000:5000'
    depends_on:
      - mongo
      - ml_service
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/interview_platform
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ML_SERVICE_URL: http://ml_service:8000
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: production
    volumes:
      - ./backend/uploads:/app/uploads

  ml_service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: interview_ml
    restart: always
    ports:
      - '8000:8000'
    environment:
      PORT: 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interview_frontend
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000

volumes:
  mongo_data:

  
